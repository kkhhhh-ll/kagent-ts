# .github/workflows/deploy.yml

name: Deploy VitePress site to Pages

on:
  push:
    branches: [master] # 监听 master 分支的推送，如果你的默认分支是 master，请修改这里
  workflow_dispatch: # 允许从 GitHub Actions 页面手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm # 如果你用 yarn 或 pnpm，需要修改这里的缓存和下方的 install/ build 命令
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: npm ci # 或者 yarn install / pnpm install
      - name: Build with VitePress
        run: npm run docs:build # 或者 yarn docs:build / pnpm docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
